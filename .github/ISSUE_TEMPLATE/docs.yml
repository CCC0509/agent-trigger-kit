name: Documentation issue
description: Report unclear, missing, or stale documentation.
title: 'docs: '
labels:
  - documentation
body:
  - type: textarea
    id: location
    attributes:
      label: Location
      description: Which page, section, or example needs work?
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: Issue
      description: What is confusing, missing, or incorrect?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
