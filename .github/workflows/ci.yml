name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: Validate Trigger Layer (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint scripts
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Check scratch namespace
        run: npm run check:scratch-namespace

      - name: Run script tests
        run: npm test

      - name: Validate trigger layer
        run: npm run validate

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code@2.1.116

      - name: Validate Claude marketplace manifest
        run: claude plugin validate .

      - name: Validate Claude plugin manifest
        run: claude plugin validate plugins/agent-trigger-kit

  premerge-version:
    name: Pre-Merge Version Reconciliation
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check source-visible version reconciliation
        run: npm run ops:premerge-version-check -- --base origin/${{ github.base_ref }}

  scratch-namespace-advisory:
    name: Scratch Namespace Advisory
    # Draft PRs get early advisory annotations before the hard validate gate matters.
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == true
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Report tracked scratch namespace files
        run: npm run check:scratch-namespace -- --advisory

  scratch-namespace:
    name: Check Scratch Namespace
    # Belt-and-suspenders guard: validate already checks PRs and main pushes, but
    # keep a final main-only gate so protected history cannot retain scratch docs.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check scratch namespace
        run: npm run check:scratch-namespace

  release-tag:
    name: Release Tag
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure Git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create missing release tag
        run: npm run ops:release-tag -- --apply
