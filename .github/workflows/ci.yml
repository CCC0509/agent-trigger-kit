name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    name: Validate Trigger Layer (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint scripts
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Run script tests
        run: npm test

      - name: Validate trigger layer
        run: npm run validate

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code@2.1.116

      - name: Validate Claude marketplace manifest
        run: claude plugin validate .

      - name: Validate Claude plugin manifest
        run: claude plugin validate plugins/agent-trigger-kit

  scratch-namespace-advisory:
    name: Scratch Namespace Advisory
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Report tracked scratch namespace files
        run: npm run check:scratch-namespace -- --advisory

  scratch-namespace:
    name: Check Scratch Namespace
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check scratch namespace
        run: npm run check:scratch-namespace
