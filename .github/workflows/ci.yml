name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    name: Validate Trigger Layer (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint scripts
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Run script tests
        run: npm test

      - name: Validate trigger layer
        run: npm run validate

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code@2.1.116

      - name: Validate Claude marketplace manifest
        run: claude plugin validate .

      - name: Validate Claude plugin manifest
        run: claude plugin validate plugins/agent-trigger-kit
