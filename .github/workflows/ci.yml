name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    name: Validate Trigger Layer
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run script tests
        run: npm test

      - name: Validate trigger layer
        run: node scripts/validate-trigger-layer.mjs --root .

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Validate Claude marketplace manifest
        run: claude plugin validate .

      - name: Validate Claude plugin manifest
        run: claude plugin validate plugins/agent-trigger-kit
